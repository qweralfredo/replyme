<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReplyMe - Kanban Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>ReplyMe <span class="badge">Cognitive Hub</span></h1>
                    <p>Supervise and override AI classification decisions seamlessly.</p>
                </div>
                <button id="open-settings" class="btn-secondary">⚙️ Configure Rules</button>
            </div>
        </header>

        <main class="kanban-board" id="kanban-board-container">
            <!-- Columns will be injected here dynamically by kanban.js -->
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-backdrop hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Manage Columns & AI Rules</h2>
                <button id="close-settings" class="btn-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="new-column-form">
                    <h3>Add New Column</h3>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <input type="text" id="new-col-name" placeholder="Column Name (e.g. Urgent Sales)" required>
                        <input type="text" id="new-col-key" placeholder="Key (e.g. urgent_sales)" required>
                    </div>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <input type="text" id="new-col-category" placeholder="AI Category Rule (e.g. sales)">
                        <input type="text" id="new-col-urgency" placeholder="AI Urgency Rule (e.g. high)">
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%">Create Column</button>
                </form>
                <hr style="margin: 20px 0; border: 1px solid var(--border-color)">
                <h3>Existing Columns</h3>
                <ul id="settings-columns-list" style="list-style: none; padding: 0;"></ul>
            </div>
        </div>
    </div>

    <!-- AI Review Modal -->
    <div id="ai-modal" class="modal-backdrop hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Review AI Response</h2>
                <button id="close-modal" class="btn-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="review-form">
                    <input type="hidden" id="modal-card-id">
                    
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="modal-category" readonly>
                    </div>

                    <div class="form-group">
                        <label>Urgency</label>
                        <input type="text" id="modal-urgency" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label>AI Response</label>
                        <textarea id="modal-response" rows="6"></textarea>
                    </div>

                    <button type="submit" class="btn-primary">Approve & Mark Done</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/card.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/kanban.js"></script>
</body>
</html>
